name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_upload:
        description: Replace assets and notes if the release already exists
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          FORCE_UPLOAD: ${{ inputs.force_upload || 'false' }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            ASSET_COUNT="$(gh release view "$TAG" --json assets --jq '[.assets[].name | select(endswith(".dmg") or endswith("-mac.zip"))] | length')"
            echo "asset_count=$ASSET_COUNT" >> "$GITHUB_OUTPUT"
            if [ "$FORCE_UPLOAD" = "true" ]; then
              echo "skip=false" >> "$GITHUB_OUTPUT"
            elif [ "$ASSET_COUNT" -ge 2 ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "asset_count=0" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > release-notes.md <<EOF
          ## 宝塔站点 SSH v$VERSION

          面向日常使用的稳定版本，重点完善站点 SSH 的启用、禁用、权限授权和文档说明。

          ### 本次更新

          - README 重新整理为使用者文档，清楚说明启用和禁用时的本机操作与服务器端操作
          - 明确启用时会创建或更新站点用户、写入 authorized_keys、添加站点目录 ACL 和本机 SSH 配置
          - 明确禁用时会移除本机 SSH 配置、锁定远程用户并清理站点用户 ACL
          - 保留站点子目录穿透权限修复，避免站点位于其他网站子目录时权限不足
          - 版本号升级为 v$VERSION

          ### 下载

          - \`SSH-$VERSION.dmg\`
          - \`SSH-$VERSION-mac.zip\`
          EOF

      - name: Update existing release notes
        if: steps.existing.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release edit "$TAG" \
            --title "宝塔站点 SSH v$VERSION" \
            --notes-file release-notes.md

      - name: Stop if release assets already exist
        if: steps.existing.outputs.skip == 'true'
        run: echo "Release ${{ steps.version.outputs.tag }} already has dmg/zip assets; notes refreshed."

      - name: Setup Node
        if: steps.existing.outputs.skip != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.existing.outputs.skip != 'true'
        run: npm ci

      - name: Ensure tag exists
        if: steps.existing.outputs.skip != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists."
          else
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
          fi

      - name: Build package
        if: steps.existing.outputs.skip != 'true'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          trap 'echo "dist contents:"; find dist -maxdepth 1 -type f -print 2>/dev/null || true' EXIT
          npm run package

      - name: Publish release
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_EXISTS: ${{ steps.existing.outputs.exists }}
        run: |
          DMG_PATH="$(find dist -maxdepth 1 -type f -name "*$VERSION*.dmg" | head -n 1)"
          ZIP_PATH="$(find dist -maxdepth 1 -type f -name "*$VERSION*-mac.zip" | head -n 1)"
          test -f "$DMG_PATH"
          test -f "$ZIP_PATH"

          DMG_UPLOAD="dist/SSH-$VERSION.dmg"
          ZIP_UPLOAD="dist/SSH-$VERSION-mac.zip"
          [ "$DMG_PATH" = "$DMG_UPLOAD" ] || cp "$DMG_PATH" "$DMG_UPLOAD"
          [ "$ZIP_PATH" = "$ZIP_UPLOAD" ] || cp "$ZIP_PATH" "$ZIP_UPLOAD"
          echo "Uploading $DMG_UPLOAD"
          echo "Uploading $ZIP_UPLOAD"

          if [ "$RELEASE_EXISTS" != "true" ]; then
            gh release create "$TAG" \
              --title "宝塔站点 SSH v$VERSION" \
              --notes-file release-notes.md
          fi

          gh release upload "$TAG" "$DMG_UPLOAD" "$ZIP_UPLOAD" --clobber
          gh release edit "$TAG" \
            --title "宝塔站点 SSH v$VERSION" \
            --notes-file release-notes.md
