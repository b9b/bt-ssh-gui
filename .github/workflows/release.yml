name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      force_upload:
        description: Replace assets and notes if the release already exists
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          FORCE_UPLOAD: ${{ inputs.force_upload || 'false' }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            ASSET_COUNT="$(gh release view "$TAG" --json assets --jq '[.assets[].name | select(endswith(".dmg") or endswith("-mac.zip"))] | length')"
            echo "asset_count=$ASSET_COUNT" >> "$GITHUB_OUTPUT"
            if [ "$FORCE_UPLOAD" = "true" ]; then
              echo "skip=false" >> "$GITHUB_OUTPUT"
            elif [ "$ASSET_COUNT" -ge 2 ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "asset_count=0" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if release assets already exist
        if: steps.existing.outputs.skip == 'true'
        run: echo "Release ${{ steps.version.outputs.tag }} already has dmg/zip assets; nothing to publish."

      - name: Setup Node
        if: steps.existing.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.existing.outputs.skip != 'true'
        run: npm ci

      - name: Ensure tag exists
        if: steps.existing.outputs.skip != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists."
          else
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
          fi

      - name: Build package
        if: steps.existing.outputs.skip != 'true'
        run: npm run package

      - name: Write release notes
        if: steps.existing.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > release-notes.md <<EOF
          ## 宝塔站点 SSH v$VERSION

          修复站点路径位于其他网站子目录中时，专用 SSH 用户因上级目录缺少穿透权限导致访问不足的问题。

          ### 修复

          - 启用站点 SSH 时，为目标站点路径的上级目录追加仅可进入的 ACL
          - 不开放上级目录读取列表或写入权限，站点目录内部仍按原逻辑授权
          - 禁用站点 SSH 时同步清理上级目录 ACL
          - 站点权限测试新增路径进入检查，并扩大子目录测试范围

          ### 下载

          - \`宝塔站点 SSH-$VERSION.dmg\`
          - \`宝塔站点 SSH-$VERSION-mac.zip\`
          EOF

      - name: Publish release
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_EXISTS: ${{ steps.existing.outputs.exists }}
        run: |
          DMG_PATH="$(find dist -maxdepth 1 -type f -name "*$VERSION*.dmg" | head -n 1)"
          ZIP_PATH="$(find dist -maxdepth 1 -type f -name "*$VERSION*-mac.zip" | head -n 1)"
          test -f "$DMG_PATH"
          test -f "$ZIP_PATH"

          if [ "$RELEASE_EXISTS" != "true" ]; then
            gh release create "$TAG" \
              --title "宝塔站点 SSH v$VERSION" \
              --notes-file release-notes.md
          fi

          gh release upload "$TAG" "$DMG_PATH" "$ZIP_PATH" --clobber
          gh release edit "$TAG" \
            --title "宝塔站点 SSH v$VERSION" \
            --notes-file release-notes.md
